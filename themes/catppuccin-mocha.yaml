  tab_active: "#cba6f7"
  tab_inactive: "#6c7086"

  # Additional palette colors (Catppuccin Mocha palette)
  selection: "#313244"
  comment: "#6c7086"
  cyan: "#94e2d5"
  green: "#a6e3a1"
  orange: "#fab387"
  pink: "#f5c2e7"
  purple: "#cba6f7"
  red: "#f38ba8"
  yellow: "#f9e2af"
