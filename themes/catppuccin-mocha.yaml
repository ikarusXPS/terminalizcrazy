name: "Catppuccin Mocha"
author: "Catppuccin"
version: "1.0.0"

colors:
  # Base colors
  background: "#1e1e2e"
  foreground: "#cdd6f4"

  # Semantic colors
  primary: "#cba6f7"
  secondary: "#a6e3a1"
  warning: "#fab387"
  error: "#f38ba8"
  success: "#a6e3a1"
  muted: "#6c7086"

  # Chat colors
  user_message: "#f5c2e7"
  ai_message: "#a6e3a1"
  system_message: "#6c7086"

  # UI element colors
  pane_border_focused: "#cba6f7"
