name: "Dracula"
author: "Zeno Rocha"
version: "1.0.0"

colors:
  # Base colors
  background: "#282a36"
  foreground: "#f8f8f2"

  # Semantic colors
  primary: "#bd93f9"
  secondary: "#50fa7b"
  warning: "#ffb86c"
  error: "#ff5555"
  success: "#50fa7b"
  muted: "#6272a4"

  # Chat colors
  user_message: "#ff79c6"
