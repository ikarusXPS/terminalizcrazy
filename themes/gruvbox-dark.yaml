name: "Gruvbox Dark"
author: "morhetz"
version: "1.0.0"

colors:
  # Base colors
  background: "#282828"
  foreground: "#ebdbb2"

  # Semantic colors
  primary: "#d3869b"
  secondary: "#b8bb26"
  warning: "#fe8019"
  error: "#fb4934"
  success: "#b8bb26"
  muted: "#928374"

  # Chat colors
  user_message: "#83a598"
  ai_message: "#b8bb26"
  system_message: "#928374"

  # UI element colors
  pane_border_focused: "#d3869b"
  pane_border_unfocused: "#928374"
  tab_active: "#d3869b"
  tab_inactive: "#928374"

  # Additional palette colors (Gruvbox palette)
  selection: "#3c3836"
  comment: "#928374"
  cyan: "#8ec07c"
  green: "#b8bb26"
  orange: "#fe8019"
  pink: "#d3869b"
  purple: "#d3869b"
  red: "#fb4934"
  yellow: "#fabd2f"
